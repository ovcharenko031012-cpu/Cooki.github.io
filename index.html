<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Text Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">🍪<br>Cookie</h1>
        <p class="sidebar-subtitle">Text Magic</p>
      </div>
      
      <div class="sidebar-section">
        <label for="transformSelect" class="section-label">Transform</label>
        <select id="transformSelect" class="sidebar-select">
          <option value="none">Original</option>
          <option value="uppercase">UPPERCASE</option>
          <option value="lowercase">lowercase</option>
          <option value="titlecase">Title Case</option>
          <option value="reverse">Reverse</option>
          <option value="sentencecase">Sentence</option>
        </select>
      </div>

      <div class="sidebar-section">
        <label class="section-label">Stats</label>
        <div class="stats-box">
          <div class="stat">
            <span class="stat-label">Chars</span>
            <span id="charCount" class="stat-value">0</span>
          </div>
          <div class="stat">
            <span class="stat-label">Words</span>
            <span id="wordCount" class="stat-value">0</span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <label class="section-label">Actions</label>
        <div class="action-buttons">
          <button id="copyBtn" class="action-btn action-copy" title="Copy result">📋</button>
          <button id="quickFillBtn" class="action-btn action-fill" title="Load example">⚡</button>
          <button id="clearBtn" class="action-btn action-clear" title="Clear">🗑️</button>
          <button id="sendBtn" class="action-btn action-send" title="Send to email">✉️</button>
        </div>
      </div>

      <button id="themeToggle" class="theme-btn">🌙</button>
    </div>

    <main class="main-content">
      <div class="header-section">
        <h2 class="main-title">Transform Your Text</h2>
        <p class="main-subtitle">Enter text and watch it transform in real-time</p>
      </div>

      <textarea id="textInput" class="giant-textarea" placeholder="Type or paste your text here..."></textarea>

      <div class="transforms-grid">
        <div class="transform-card" data-format="none">
          <span class="card-emoji">📝</span>
          <h3>Original</h3>
          <div id="output-none" class="card-content">Your original text</div>
        </div>

        <div class="transform-card" data-format="uppercase">
          <span class="card-emoji">⬆️</span>
          <h3>UPPERCASE</h3>
          <div id="output-uppercase" class="card-content">TEXT IN CAPS</div>
        </div>

        <div class="transform-card" data-format="lowercase">
          <span class="card-emoji">⬇️</span>
          <h3>lowercase</h3>
          <div id="output-lowercase" class="card-content">text in lowercase</div>
        </div>

        <div class="transform-card" data-format="titlecase">
          <span class="card-emoji">📌</span>
          <h3>Title Case</h3>
          <div id="output-titlecase" class="card-content">Text In Title Case</div>
        </div>

        <div class="transform-card" data-format="reverse">
          <span class="card-emoji">🔄</span>
          <h3>Reverse</h3>
          <div id="output-reverse" class="card-content">txet desrever</div>
        </div>

        <div class="transform-card" data-format="sentencecase">
          <span class="card-emoji">💬</span>
          <h3>Sentence</h3>
          <div id="output-sentencecase" class="card-content">Sentence case text</div>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
